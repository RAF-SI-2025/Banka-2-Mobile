name: mobile-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build + Lint + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # `lintDebug` ima `warningsAsErrors=true` + `abortOnError=true` u app/build.gradle.kts —
      # CI puca odmah ako ima bilo koji warning. Cuva nas od skrivenog tehnickog duga.
      - name: Lint (warnings as errors)
        run: ./gradlew lintDebug --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload lint report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
